<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguas Paraiso</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <script type="module" src="/scriptFormularioPagos.js"></script>
<form>
  <h1>Regístrese para pagar su factura</h1>

  <label for="usuario">Usuario</label>
  <input id="usuario" type="text">

  <label for="clave">Contraseña</label>
  <input id="clave" type="password">

  <!-- Mensaje principal -->
  <div id="mensaje"></div>

  <!-- Contenedor para el párrafo adicional -->
  <div id="extra"></div>

  <!-- Botón siempre abajo -->
  <input class="boton" type="button" value="Iniciar Sesión">
</form>
</body>
</html>
