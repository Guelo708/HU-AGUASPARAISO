<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagar Factura - AGUAS PARAÍSO</title>
  <link rel="stylesheet" href="/pagosLinea.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <ul class="nav-menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Tarifas y facturación</a></li>
        <li><a href="#" class="active">Pagar factura</a></li>
        <li><a href="#">Sucursal virtual</a></li>
      </ul>
    </nav>
  </header>

  <main class="contenido">
    <h1>Pagar mi factura en línea</h1>
    <p>Evita desplazamientos y realiza tu pago de forma segura desde casa.</p>

    <form id="pagoForm">
      <label for="referencia">Número de referencia de factura:</label>
      <input type="text" id="referencia" name="referencia" required />

      <label for="valor">Valor a pagar (COP):</label>
      <input type="number" id="valor" name="valor" required min="1000" />

      <label for="metodo">Método de pago:</label>
      <select id="metodo" name="metodo" required>
        <option value="">Seleccione una opción</option>
        <option value="pse">PSE</option>
        <option value="payu">PayU</option>
      </select>

      <button type="submit">Ir a pagar</button>
      <div class="success" id="confirmacionPago"></div>
    </form>
  </main>

  <footer class="footer">
    <p>📱 WhatsApp: Miguel Eduardo Hernández - 3105301220</p>
    <p>📧 Correo: David Felipe Valencia - <a href="mailto:dvalenciabetancur@gmail.com">dvalenciabetancur@gmail.com</a></p>
  </footer>

  <script>
    const form = document.getElementById('pagoForm');
    const confirmacion = document.getElementById('confirmacionPago');

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      confirmacion.textContent = '✅ Redirigiendo a la pasarela de pagos... (simulado)';
      form.reset();
    });
  </script>

</body>
</html>
