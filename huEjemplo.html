<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear Nuevo Usuario - AGUAS PARAÍSO</title>
  <link rel="stylesheet" href="/styleshuejemplo.css">
</head>
<body>

  <h1>Crear Nuevo Usuario</h1>

  <form id="userForm">
    <label for="name">Nombre completo:</label>
    <input type="text" id="name" name="name" required />

    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" name="email" required />
    <div class="error" id="emailError">Este correo ya está registrado.</div>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required minlength="6" />

    <label for="role">Rol:</label>
    <select id="role" name="role" required>
      <option value="">Seleccione un rol</option>
      <option value="admin">Administrador</option>
      <option value="user">Usuario estándar</option>
    </select>

    <button type="submit">Crear Usuario</button>
    <div class="success" id="successMessage"></div>
  </form>

  <script>
    const form = document.getElementById('userForm');
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const successMessage = document.getElementById('successMessage');

    // Simulación de correos ya registrados
    const correosRegistrados = ['admin@aguasparaiso.com', 'usuario@aguasparaiso.com'];

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      const email = emailInput.value.trim();

      if (correosRegistrados.includes(email)) {
        emailError.style.display = 'block';
        successMessage.textContent = '';
      } else {
        emailError.style.display = 'none';
        successMessage.textContent = '✅ Usuario creado exitosamente.';
        form.reset();
      }
    });
  </script>

</body>
</html>
